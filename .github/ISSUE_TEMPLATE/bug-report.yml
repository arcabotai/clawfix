name: Bug report
description: Report a reproducible ClawFix defect that is not security-sensitive.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not post vulnerabilities or raw diagnostics here. Use GitHub Security Advisories for security or privacy failures.
  - type: input
    id: version
    attributes:
      label: ClawFix version
      placeholder: 0.9.1
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - npm CLI
        - curl script
        - hosted API
        - self-hosted service
        - documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Redacted reproduction
      description: List the commands and behavior without including secrets or private logs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, personal data, private paths, and chat content.
          required: true
