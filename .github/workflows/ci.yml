name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install repair validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Syntax-check CLI and tooling
        run: |
          node --check cli/bin/clawfix.js
          node --check cli/bin/native-diagnostics.js
          node --check cli/index.js
          node --check scripts/blaxel-contracts.mjs
          node --check scripts/verify-cli-package.mjs

      - name: Test
        run: npm test

      - name: Validate repair catalog
        run: npm run validate:repairs

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Pack and verify CLI publish manifest
        run: |
          manifest=$(mktemp)
          trap 'rm -f "$manifest"' EXIT
          npm pack ./cli --dry-run --json --cache /tmp/clawfix-npm-cache > "$manifest"
          node scripts/verify-cli-package.mjs "$manifest"

  container:
    name: Production container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build -t clawfix:ci .
