name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install repair validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Test
        run: npm test

      - name: Validate repair catalog
        run: npm run validate:repairs

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify publish manifest
        run: npm pack --dry-run --json --cache /tmp/clawfix-npm-cache

  container:
    name: Production container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build -t clawfix:ci .
