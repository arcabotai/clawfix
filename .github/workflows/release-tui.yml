name: Release TUI binaries

# Builds standalone ClawFix OpenTUI executables with Bun --compile.
# Starts with Linux x64 (+ baseline). Expand matrix as native packages are proven.

on:
  workflow_dispatch:
    inputs:
      targets:
        description: Comma-separated TUI targets
        required: false
        default: linux-x64,linux-x64-baseline
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-tui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-tui:
    name: tui-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-x64-baseline
            runner: ubuntu-latest
          # Expand after linux-x64 is green:
          # - target: linux-arm64
          #   runner: ubuntu-24.04-arm
          # - target: darwin-arm64
          #   runner: macos-14
          # - target: darwin-x64
          #   runner: macos-13
          # - target: windows-x64
          #   runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun 1.2.21
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install TUI dependencies
        working-directory: cli/tui
        run: bun install --frozen-lockfile

      - name: Install target native OpenTUI package
        working-directory: cli/tui
        run: |
          case "${{ matrix.target }}" in
            linux-x64|linux-x64-baseline) pkg="@opentui/core-linux-x64" ;;
            linux-arm64) pkg="@opentui/core-linux-arm64" ;;
            darwin-arm64) pkg="@opentui/core-darwin-arm64" ;;
            darwin-x64) pkg="@opentui/core-darwin-x64" ;;
            windows-x64) pkg="@opentui/core-windows-x64" ;;
            *) echo "unknown target"; exit 1 ;;
          esac
          bun add --optional "${pkg}@0.4.5" || true

      - name: Build standalone binary
        env:
          TUI_TARGETS: ${{ matrix.target }}
          TUI_OUTDIR: ${{ github.workspace }}/dist/tui
          SKIP_INSTALL: "1"
        run: node scripts/build-tui-release.mjs

      - name: Verify artifact
        run: |
          shopt -s nullglob
          bins=(dist/tui/*.bin dist/tui/*.bin.exe)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "::error ::no clawfix-tui .bin artifacts produced"
            exit 1
          fi
          for b in "${bins[@]}"; do
            node scripts/verify-tui-artifact.mjs "$b" --target "${{ matrix.target }}"
          done
          test -d "dist/tui/assets-${{ matrix.target }}"
          test -x "dist/tui/clawfix-tui-${{ matrix.target }}" -o -f "dist/tui/clawfix-tui-${{ matrix.target }}.cmd"

      - name: Smoke binary (linux only)
        if: runner.os == 'Linux'
        run: |
          launcher="$PWD/dist/tui/clawfix-tui-${{ matrix.target }}"
          test -x "$launcher"
          # Proves compile + OTUI_ASSET_ROOT launcher; no wasm path crash.
          node scripts/smoke-tui-binary.mjs "$launcher"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawfix-tui-${{ matrix.target }}
          path: |
            dist/tui/**
          if-no-files-found: error
          retention-days: 14

  publish-release-assets:
    name: attach-tui-assets
    needs: build-tui
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all TUI artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-tui
          pattern: clawfix-tui-*
          merge-multiple: false

      - name: Package target tarballs
        run: |
          set -euo pipefail
          mkdir -p release-dist
          # download-artifact layout with merge-multiple=false:
          #   release-tui/clawfix-tui-<target>/{launcher,.bin,assets-<target>/,...}
          shopt -s nullglob
          packed=0
          for dir in release-tui/clawfix-tui-*; do
            [ -d "$dir" ] || continue
            target=$(basename "$dir" | sed 's/^clawfix-tui-//')
            launcher="$dir/clawfix-tui-$target"
            binary="$dir/clawfix-tui-$target.bin"
            assets="$dir/assets-$target"
            if [ ! -f "$launcher" ] || [ ! -f "$binary" ] || [ ! -d "$assets" ]; then
              echo "::error ::incomplete artifact tree for $target under $dir"
              ls -la "$dir" || true
              exit 1
            fi
            tar -C "$dir" -czf "release-dist/clawfix-tui-${target}.tar.gz" .
            echo "packed clawfix-tui-${target}.tar.gz"
            packed=$((packed + 1))
          done
          if [ "$packed" -lt 1 ]; then
            echo "::error ::no TUI target tarballs produced"
            find release-tui -maxdepth 3 -type f | head -100
            exit 1
          fi
          (
            cd release-dist
            sha256sum ./*.tar.gz > TUI-SHA256SUMS
            ls -lah
            test -s TUI-SHA256SUMS
          )

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*.tar.gz
            release-dist/TUI-SHA256SUMS
          fail_on_unmatched_files: true
