name: Release CLI

# Runs on semver tag pushes only (`v0.9.0`, `v1.0.0-rc.1`, etc.).
# Publishes cli/ to npm and creates a GitHub Release with auto-generated notes.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Install repair validators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Verify tag and package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ROOT=$(node -p "require('./package.json').version")
          CLI=$(node -p "require('./cli/package.json').version")
          if [ "$TAG" != "$CLI" ] || [ "$ROOT" != "$CLI" ]; then
            echo "::error ::Tag v$TAG, root version $ROOT, and CLI version $CLI must match"
            exit 1
          fi

      - name: Syntax-check CLI and tooling
        run: |
          node --check cli/bin/clawfix.js
          node --check cli/bin/native-diagnostics.js
          node --check cli/index.js
          node --check scripts/blaxel-contracts.mjs
          node --check scripts/verify-cli-package.mjs

      - name: Test
        run: npm test

      - name: Validate repair catalog
        run: npm run validate:repairs

      - name: Pack and verify CLI publish manifest
        run: |
          manifest=$(mktemp)
          trap 'rm -f "$manifest"' EXIT
          npm pack ./cli --dry-run --json --cache /tmp/clawfix-npm-cache > "$manifest"
          node scripts/verify-cli-package.mjs "$manifest"

      - name: Publish CLI to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
